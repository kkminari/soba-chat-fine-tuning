# ============================================================
# SOBA 챗봇 파인튜닝 설정 — Exp4 검증 학습 (Phase B)
# ============================================================
# 목적: v3 데이터가 과적합 지점을 늦추는지 1 epoch로 빠르게 검증
# 기반: training_config_v3.yaml (동일) + num_train_epochs: 1
# 검증 후 training_config_v3.yaml로 본 학습(2 epoch) 진입

model:
  name: "Qwen/Qwen3-8B"
  max_seq_length: 768

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.10
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_train_epochs: 1                 # 검증용: 1 epoch만
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  optim: "paged_adamw_8bit"
  fp16: false
  bf16: true
  logging_steps: 5
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: "wandb"

data:
  data_path: "./data/processed_v3"

wandb:
  project: "soba-chatbot-finetuning"
  run_name: "qwen3-8b-qlora-soba-v3-pilot"

output:
  output_dir: "./outputs_v3_pilot"
  adapter_dir: "./outputs_v3_pilot/adapter"

inference:
  temperature: 0.7
  max_new_tokens: 256
