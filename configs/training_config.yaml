# ============================================================
# SOBA 챗봇 파인튜닝 설정
# ============================================================
# 목적: 대화 생성 (인트로, 코멘트+리프레이징, 재시도, 종료, 제목) 6개 태스크
# 베이스: Qwen3-14B + QLoRA
# 데이터: GPT-4o 합성 데이터 5,433건 (train 4,342 / val 513 / test 578)

# ============================================================
# 모델 설정
# ============================================================
model:
  name: "Qwen/Qwen3-14B"
  max_seq_length: 768             # 파일럿 테스트에서 512 초과 30% → 768로 상향

# ============================================================
# 양자화 (Quantization) 설정
# ============================================================
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# ============================================================
# LoRA 설정
# ============================================================
lora:
  r: 32                          # 데이터 ~7,800건 → 32 적절 (가이드: 500~5000건 16~32)
  lora_alpha: 64                 # r의 2배
  lora_dropout: 0.05             # 데이터 충분, dropout 낮춤
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# ============================================================
# 학습 하이퍼파라미터
# ============================================================
training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2  # 실효 배치 = 4 × 2 = 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  optim: "paged_adamw_8bit"
  fp16: false
  bf16: true                     # A100/H100: true
  logging_steps: 5
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: "wandb"

# ============================================================
# 데이터 설정
# ============================================================
data:
  data_path: "./data/processed"   # train.jsonl, val.jsonl, test.jsonl 위치
  # 분할은 이미 완료됨 (seed_id 기준, 누수 방지)
  # train: 4,342건 (199 seeds) / val: 513건 (24 seeds) / test: 578건 (26 seeds)

# ============================================================
# WandB
# ============================================================
wandb:
  project: "soba-chatbot-finetuning"
  run_name: "qwen3-14b-qlora-soba-v1"

# ============================================================
# 출력 경로
# ============================================================
output:
  output_dir: "./outputs"
  adapter_dir: "./outputs/adapter"

# ============================================================
# 추론 설정
# ============================================================
inference:
  temperature: 0.7              # 대화 생성이므로 약간의 다양성 허용
  max_new_tokens: 256           # 코멘트+리프레이징 JSON 출력 충분
